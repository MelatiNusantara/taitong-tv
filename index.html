<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Taitong Money Changer</title>

  <style>
    :root{
      --bg0:#05070c;
      --bg1:#0b1020;
      --bg2:#101a31;
      --card:#101a31;
      --card2:#0d1629;
      --line:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.80);
      --muted2:rgba(255,255,255,.62);
      --accent:#ffd200;
      --accent2:#ffea6a;
      --good:#63ff90;
      --bad:#ff6b6b;
      --shadow:0 16px 40px rgba(0,0,0,.38);
      --radius:24px;
      --safe:18px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#05070c;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:#fff;
    }

    body{
      background:
        radial-gradient(1000px 900px at 18% 8%, rgba(255,210,0,.12), transparent 55%),
        radial-gradient(800px 700px at 92% 18%, rgba(0,162,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    /* =========================================================
       PENTING:
       Seluruh app diputar 90deg CLOCKWISE.
       Jadi di laptop kelihatan miring,
       tapi di TV portrait yang terpasang akan pas.
       ========================================================= */
    .screen{
      position:fixed;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(1000px 900px at 18% 8%, rgba(255,210,0,.12), transparent 55%),
        radial-gradient(800px 700px at 92% 18%, rgba(0,162,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .rotatedApp{
      position:absolute;
      top:0;
      left:100vw;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg);
      overflow:hidden;
    }

    .app{
      width:100%;
      height:100%;
      padding:var(--safe);
      display:grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      gap:14px;
    }

    .card{
      position:relative;
      background:linear-gradient(180deg, rgba(16,26,49,.97), rgba(12,20,37,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,210,0,.10), transparent 24%, transparent 76%, rgba(0,162,255,.08));
      opacity:.95;
    }

    /* HEADER */
    .brandCard{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      min-height:98px;
    }

    .logoMark{
      width:60px;
      height:60px;
      border-radius:18px;
      flex:0 0 auto;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.26), transparent 50%),
        linear-gradient(180deg, rgba(255,210,0,1), rgba(255,210,0,.60));
      box-shadow:0 8px 24px rgba(255,210,0,.22);
      position:relative;
    }

    .logoMark::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:12px;
      border:2px solid rgba(0,0,0,.36);
    }

    .brandText{
      min-width:0;
      flex:1 1 auto;
    }

    .title{
      font-size:clamp(30px, 4.1vw, 50px);
      font-weight:900;
      letter-spacing:.04em;
      line-height:1.04;
      text-transform:uppercase;
      text-shadow:0 6px 18px rgba(0,0,0,.42);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      margin-top:6px;
      font-size:clamp(15px, 1.8vw, 22px);
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* STATUS */
    .topInfo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .pillCard{
      min-height:84px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .pillLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--good);
      box-shadow:0 0 0 6px rgba(99,255,144,.12);
      flex:0 0 auto;
    }

    .dot.offline{
      background:var(--bad);
      box-shadow:0 0 0 6px rgba(255,107,107,.12);
    }

    .pillLabel{
      font-size:clamp(16px, 1.9vw, 22px);
      color:var(--muted2);
      white-space:nowrap;
    }

    .pillValue{
      font-size:clamp(20px, 2.2vw, 30px);
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
    }

    .updatedTag{
      color:#111;
      background:linear-gradient(180deg, var(--accent), var(--accent2));
      padding:7px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      letter-spacing:.06em;
      text-transform:uppercase;
      flex:0 0 auto;
    }

    /* MAIN */
    .main{
      min-height:0;
      display:grid;
      grid-template-columns: 1.02fr .98fr;
      gap:14px;
    }

    .panel{
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
    }

    .sectionHead{
      position:relative;
      z-index:1;
      padding:15px 18px 12px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02);
    }

    .sectionHead h2{
      margin:0;
      font-size:clamp(22px, 2.4vw, 34px);
      letter-spacing:.02em;
    }

    .sectionHint{
      font-size:clamp(12px, 1.3vw, 16px);
      color:var(--muted2);
      white-space:nowrap;
      text-align:right;
    }

    /* RATES */
    .ratesWrap{
      position:relative;
      z-index:1;
      min-height:0;
      padding:8px 14px 14px;
      overflow:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead th{
      text-align:left;
      padding:12px 14px;
      font-size:clamp(14px, 1.35vw, 17px);
      color:rgba(255,255,255,.82);
      border-bottom:1px solid var(--line);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    thead th:nth-child(2),
    thead th:nth-child(3){
      text-align:right;
    }

    tbody td{
      padding:16px 14px;
      border-bottom:1px solid rgba(255,255,255,.07);
      vertical-align:middle;
      font-size:clamp(24px, 2.7vw, 38px);
    }

    tbody tr:last-child td{
      border-bottom:0;
    }

    td.num{
      text-align:right;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
      font-weight:900;
      white-space:nowrap;
    }

    .ccy{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .badge{
      min-width:72px;
      font-weight:900;
      letter-spacing:.06em;
      white-space:nowrap;
    }

    .unit{
      font-size:.56em;
      color:var(--muted2);
      border:1px solid rgba(255,255,255,.14);
      padding:4px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      white-space:nowrap;
    }

    /* PROMO */
    .promoWrap{
      position:relative;
      z-index:1;
      min-height:0;
      padding:14px;
      display:grid;
      grid-template-rows:minmax(0, 1fr) auto;
      gap:12px;
    }

    .adStage{
      min-height:0;
      position:relative;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .adStage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .adText{
      padding:24px;
      text-align:center;
      font-size:clamp(24px, 2.5vw, 38px);
      line-height:1.2;
      font-weight:900;
      letter-spacing:.02em;
    }

    .adText small{
      display:block;
      margin-top:12px;
      font-size:.52em;
      line-height:1.35;
      color:var(--muted2);
      font-weight:700;
    }

    .adMeta{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
    }

    .adHint{
      min-width:0;
      border-radius:14px;
      padding:12px 14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      font-size:clamp(15px, 1.45vw, 19px);
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .adChip{
      border-radius:999px;
      padding:12px 14px;
      background:rgba(255,210,0,.12);
      border:1px solid rgba(255,210,0,.22);
      color:#fff;
      font-size:clamp(14px, 1.35vw, 18px);
      font-weight:800;
      white-space:nowrap;
    }

    /* TICKER */
    .tickerCard{
      min-height:62px;
      display:flex;
      align-items:center;
      overflow:hidden;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,210,0,.10);
      border:1px solid rgba(255,210,0,.22);
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }

    .ticker{
      display:flex;
      align-items:center;
      gap:22px;
      white-space:nowrap;
      will-change:transform;
      font-size:clamp(16px, 1.5vw, 20px);
      color:rgba(255,255,255,.92);
    }

    .ticker b{
      color:var(--accent);
      letter-spacing:.05em;
    }

    .sep{
      opacity:.5;
    }

    /* CLOCK */
    .clockCard{
      min-height:82px;
      padding:14px 16px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
    }

    .clockLeft{
      min-width:0;
    }

    .clockLabel{
      font-size:clamp(14px, 1.35vw, 18px);
      color:var(--muted2);
      margin-bottom:4px;
    }

    .clockDay{
      font-size:clamp(20px, 1.9vw, 28px);
      font-weight:700;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .clockValue{
      font-size:clamp(32px, 3vw, 48px);
      font-weight:900;
      font-variant-numeric:tabular-nums;
      letter-spacing:.03em;
      text-align:right;
      white-space:nowrap;
    }

    @media (max-height: 760px){
      .app{
        gap:10px;
        padding:12px;
      }

      .brandCard{
        min-height:86px;
        padding:12px 14px;
      }

      .topInfo{
        gap:10px;
      }

      .pillCard{
        min-height:72px;
      }

      .main{
        gap:10px;
      }

      tbody td{
        padding:12px 12px;
      }

      .adText{
        padding:18px;
      }

      .tickerCard{
        min-height:54px;
      }

      .clockCard{
        min-height:72px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="rotatedApp">
      <div class="app">
        <!-- HEADER -->
        <div class="card brandCard">
          <div class="logoMark" aria-hidden="true"></div>
          <div class="brandText">
            <div class="title" id="title">TAITONG MONEY CHANGER</div>
            <div class="subtitle" id="subtitle">Exchange Rate • Update otomatis dari Spreadsheet</div>
          </div>
        </div>

        <!-- STATUS -->
        <div class="topInfo">
          <div class="card pillCard">
            <div class="pillLeft">
              <div class="dot" id="dot"></div>
              <div class="pillLabel">Status</div>
            </div>
            <div class="pillValue" id="statusText">Online</div>
          </div>

          <div class="card pillCard">
            <div class="pillLeft">
              <div class="updatedTag">UPDATED</div>
            </div>
            <div class="pillValue" id="updatedAt">-</div>
          </div>
        </div>

        <!-- MAIN -->
        <div class="main">
          <!-- RATES -->
          <section class="card panel" aria-label="Rates">
            <div class="sectionHead">
              <h2>Exchange Rates</h2>
              <div class="sectionHint">*Harga dapat berubah sewaktu-waktu</div>
            </div>

            <div class="ratesWrap">
              <table>
                <thead>
                  <tr>
                    <th>Currency</th>
                    <th>Beli</th>
                    <th>Jual</th>
                  </tr>
                </thead>
                <tbody id="ratesBody"></tbody>
              </table>
            </div>
          </section>

          <!-- PROMO -->
          <section class="card panel" aria-label="Promo">
            <div class="sectionHead">
              <h2>Promo & Info</h2>
              <div class="sectionHint">TAITONG</div>
            </div>

            <div class="promoWrap">
              <div class="adStage" id="adStage">
                <div class="adText">
                  Loading...
                  <small>Mengambil data promo</small>
                </div>
              </div>

              <div class="adMeta">
                <div class="adHint" id="adHint">-</div>
                <div class="adChip" id="adChip">-</div>
              </div>
            </div>
          </section>
        </div>

        <!-- TICKER -->
        <div class="tickerCard card" style="border-radius:999px;">
          <div class="ticker" id="ticker">-</div>
        </div>

        <!-- CLOCK -->
        <div class="card clockCard">
          <div class="clockLeft">
            <div class="clockLabel">Waktu Lokal</div>
            <div class="clockDay" id="day">-</div>
          </div>
          <div class="clockValue" id="clock">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxkuzTHTMtqm26sYesHduzY-YhaE6g8VbhKLBuELHtykLuyP2E15Z1X5gknexortpKR/exec";
    const FALLBACK_LOCAL_JSON = "data-dummy.json";

    const DATA_REFRESH_SEC = 10;   // refresh data spreadsheet
    const PAGE_RELOAD_SEC = 45;    // hard reload halaman untuk ambil update GitHub
    const CACHE_KEY = "taitong-signage-cache-v3";

    const state = {
      ads: [],
      adIndex: 0,
      adTimer: null,
      dataRefreshHandle: null,
      pageReloadHandle: null,
      tickerAnim: null,
      lastTickerText: ""
    };

    const el = (id) => document.getElementById(id);

    function escapeHtml(str){
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function setOnline(isOnline, msg){
      el("dot").classList.toggle("offline", !isOnline);
      el("statusText").textContent = msg || (isOnline ? "Online" : "Offline");
    }

    function formatID(n){
      if (n === null || n === undefined || n === "") return "—";
      const num = Number(n);
      if (Number.isNaN(num)) return String(n);
      return num.toLocaleString("id-ID", { maximumFractionDigits: 2 });
    }

    function saveCache(data){
      try{
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          saved_at: Date.now(),
          data
        }));
      }catch(err){
        console.warn("Cache save failed", err);
      }
    }

    function readCache(){
      try{
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed?.data || null;
      }catch(err){
        console.warn("Cache read failed", err);
        return null;
      }
    }

    function normalizeRates(rates){
      return (rates || []).map(r => ({
        code: String(r.code || r.Currency || r.currency || "").trim(),
        buy: r.buy ?? r.Beli ?? r.beli ?? "",
        sell: r.sell ?? r.Jual ?? r.jual ?? "",
        unit: String(r.unit || r.Unit || r.unit_per || "1"),
        order: Number(r.order || r.Order || 999)
      })).filter(r => r.code);
    }

    function renderRates(rates){
      const rows = normalizeRates(rates)
        .sort((a,b)=>a.order - b.order)
        .slice(0, 6);

      if (!rows.length){
        el("ratesBody").innerHTML = `
          <tr>
            <td colspan="3" style="padding:24px 14px; font-size:22px; color:rgba(255,255,255,.72);">
              Data kurs belum tersedia
            </td>
          </tr>
        `;
        return;
      }

      el("ratesBody").innerHTML = rows.map(r => `
        <tr>
          <td>
            <div class="ccy">
              <div class="badge">${escapeHtml(r.code)}</div>
              <div class="unit">/ ${escapeHtml(r.unit)}</div>
            </div>
          </td>
          <td class="num">${formatID(r.buy)}</td>
          <td class="num">${formatID(r.sell)}</td>
        </tr>
      `).join("");
    }

    function setHeader(data){
      const settings = data?.settings || {};
      const title = settings.title || "TAITONG MONEY CHANGER";
      const branch = settings.branch ? String(settings.branch) : "TAITONG";
      const address = settings.address ? ` • ${String(settings.address)}` : "";
      const phone = settings.phone ? ` • ${String(settings.phone)}` : "";

      el("title").textContent = title;
      el("subtitle").textContent = `Exchange Rate • ${branch}${address}${phone}`;

      const when = data?.generated_at ? new Date(data.generated_at) : new Date();
      el("updatedAt").textContent = when.toLocaleString("id-ID", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function normalizeAds(ads){
      return (ads || []).map(a => ({
        type: String(a.type || "text").toLowerCase(),
        content: a.content || a.url || a.text || "",
        duration_sec: Math.max(3, Number(a.duration_sec || a.duration || 8)),
        order: Number(a.order || 999)
      })).filter(a => a.content);
    }

    function renderAd(item){
      const stage = el("adStage");

      if (!item){
        stage.innerHTML = `
          <div class="adText">
            INFO
            <small>Isi sheet Ads untuk menampilkan promo / informasi</small>
          </div>
        `;
        el("adHint").textContent = "Belum ada data promo";
        el("adChip").textContent = "—";
        return;
      }

      if (item.type === "image"){
        stage.innerHTML = "";
        const img = document.createElement("img");
        img.src = item.content + (item.content.includes("?") ? "&" : "?") + "t=" + Date.now();
        img.alt = "Promo";
        img.onerror = () => {
          stage.innerHTML = `
            <div class="adText">
              Gagal memuat gambar
              <small>Cek URL gambar di sheet Ads</small>
            </div>
          `;
        };
        stage.appendChild(img);
        el("adHint").textContent = "Promo image";
      } else {
        stage.innerHTML = `
          <div class="adText">
            ${escapeHtml(item.content)}
            <small>Promo TAITONG • Hubungi staff untuk info lebih lanjut</small>
          </div>
        `;
        el("adHint").textContent = "Promo text";
      }

      el("adChip").textContent = `${item.duration_sec}s`;
    }

    function startAdsRotation(){
      if (state.adTimer) clearTimeout(state.adTimer);

      if (!state.ads.length){
        renderAd(null);
        return;
      }

      const showNext = () => {
        const item = state.ads[state.adIndex % state.ads.length];
        state.adIndex++;
        renderAd(item);
        state.adTimer = setTimeout(showNext, item.duration_sec * 1000);
      };

      showNext();
    }

    function buildTickerText(data){
      const settings = data?.settings || {};
      const parts = [];

      parts.push(`<b>${escapeHtml(settings.branch || "TAITONG")}</b>`);
      parts.push(`Kurs update otomatis dari spreadsheet`);
      parts.push(`Pastikan nominal & mata uang sebelum transaksi`);

      const rates = normalizeRates(data?.rates)
        .sort((a,b)=>a.order - b.order)
        .slice(0, 6);

      rates.forEach(r => {
        parts.push(`${escapeHtml(r.code)}: ${formatID(r.buy)} / ${formatID(r.sell)}`);
      });

      parts.push(`Terima kasih telah bertransaksi di TAITONG`);

      return parts.map(p => `<span>${p}</span>`).join(`<span class="sep">•</span>`);
    }

    function startTicker(htmlText){
      const ticker = el("ticker");
      if (state.lastTickerText === htmlText) return;

      state.lastTickerText = htmlText;
      ticker.innerHTML = htmlText + htmlText;

      if (state.tickerAnim) cancelAnimationFrame(state.tickerAnim);

      let x = 0;
      const speedPxPerSec = 55;
      let last = performance.now();

      const loop = (t) => {
        const dt = (t - last) / 1000;
        last = t;
        x -= speedPxPerSec * dt;

        const half = ticker.scrollWidth / 2;
        if (half > 0 && -x >= half) x = 0;

        ticker.style.transform = `translateX(${x}px)`;
        state.tickerAnim = requestAnimationFrame(loop);
      };

      state.tickerAnim = requestAnimationFrame(loop);
    }

    function fetchJSONP(url){
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 8000);

        function cleanup(){
          clearTimeout(timeout);
          try { delete window[cb]; } catch(e) {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP load failed"));
        };

        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb + "&t=" + Date.now();
        document.body.appendChild(script);
      });
    }

    async function fetchLocalJSON(url){
      const res = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("Local JSON fetch failed");
      return await res.json();
    }

    async function fetchData(){
      if (API_URL && API_URL.trim()){
        return await fetchJSONP(API_URL.trim());
      }
      return await fetchLocalJSON(FALLBACK_LOCAL_JSON);
    }

    function applyData(data, source = "live"){
      if (!data || typeof data !== "object") return;

      setHeader(data);
      renderRates(data.rates || []);
      state.ads = normalizeAds(data.ads || []).sort((a,b)=>a.order - b.order);
      state.adIndex = 0;
      startAdsRotation();
      startTicker(buildTickerText(data));

      if (source === "live"){
        saveCache(data);
        setOnline(true, "Online");
      } else {
        setOnline(false, "Offline / Cache");
      }
    }

    function scheduleDataRefresh(sec){
      if (state.dataRefreshHandle) clearTimeout(state.dataRefreshHandle);
      state.dataRefreshHandle = setTimeout(() => {
        loadData().catch(console.error);
      }, Math.max(5, sec) * 1000);
    }

    function schedulePageReload(sec){
      if (state.pageReloadHandle) clearTimeout(state.pageReloadHandle);
      state.pageReloadHandle = setTimeout(() => {
        hardReloadPage();
      }, Math.max(20, sec) * 1000);
    }

    function hardReloadPage(){
      const url = new URL(window.location.href);
      url.searchParams.set("_page", Date.now().toString());
      window.location.replace(url.toString());
    }

    async function loadData(){
      try{
        const data = await fetchData();
        applyData(data, "live");

        const refreshFromSheet = Number(data?.settings?.refresh_sec || DATA_REFRESH_SEC);
        scheduleDataRefresh(refreshFromSheet);
      }catch(err){
        console.error("Live load failed:", err);

        const cached = readCache();
        if (cached){
          applyData(cached, "cache");
        }else{
          setOnline(false, "Offline");
        }

        scheduleDataRefresh(DATA_REFRESH_SEC);
      }
    }

    function tickClock(){
      const d = new Date();
      el("day").textContent = d.toLocaleDateString("id-ID", {
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
      });
      el("clock").textContent = d.toLocaleTimeString("id-ID", {
        hour12:false
      });
    }

    function init(){
      tickClock();
      setInterval(tickClock, 1000);

      const cached = readCache();
      if (cached){
        applyData(cached, "cache");
      }

      loadData();
      schedulePageReload(PAGE_RELOAD_SEC);
    }

    init();
  </script>
</body>
</html>
