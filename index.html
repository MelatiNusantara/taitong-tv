<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Taitong Money Changer</title>

  <style>
    :root{
      --bg0:#05070c;
      --bg1:#0b1020;
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.07);
      --muted:rgba(255,255,255,.84);
      --muted2:rgba(255,255,255,.62);
      --muted3:rgba(255,255,255,.38);
      --accent:#ffd200;
      --accent2:#ffea6a;
      --good:#63ff90;
      --warn:#ffcf4d;
      --bad:#ff6b6b;
      --shadow:0 16px 40px rgba(0,0,0,.38);
      --radius:24px;
      --safe:14px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#05070c;
      color:#fff;
      font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    body{
      background:
        radial-gradient(1000px 900px at 18% 8%, rgba(255,210,0,.12), transparent 55%),
        radial-gradient(800px 700px at 92% 18%, rgba(0,162,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .screen{
      position:fixed;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(1000px 900px at 18% 8%, rgba(255,210,0,.12), transparent 55%),
        radial-gradient(800px 700px at 92% 18%, rgba(0,162,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .rotatedApp{
      position:absolute;
      top:0;
      left:100vw;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg);
      overflow:hidden;
    }

    .app{
      width:100%;
      height:100%;
      padding:var(--safe);
      display:grid;
      grid-template-rows:auto minmax(0, 1fr) auto;
      gap:12px;
    }

    .card{
      position:relative;
      background:linear-gradient(180deg, rgba(16,26,49,.97), rgba(12,20,37,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,210,0,.10), transparent 24%, transparent 76%, rgba(0,162,255,.08));
      opacity:.95;
    }

    .brandCard{
      display:grid;
      grid-template-columns:56px minmax(0, 1fr) 108px;
      align-items:center;
      gap:12px;
      padding:12px 15px;
      min-height:94px;
    }

    .logoMark{
      width:56px;
      height:56px;
      border-radius:18px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.26), transparent 50%),
        linear-gradient(180deg, rgba(255,210,0,1), rgba(255,210,0,.60));
      box-shadow:0 8px 24px rgba(255,210,0,.22);
      position:relative;
      z-index:1;
    }

    .logoMark::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:12px;
      border:2px solid rgba(0,0,0,.36);
    }

    .brandText{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
      position:relative;
      z-index:1;
    }

    .title{
      font-size:clamp(18px, 2.2vw, 28px);
      font-weight:900;
      letter-spacing:.015em;
      line-height:1.02;
      text-transform:uppercase;
      text-shadow:0 6px 18px rgba(0,0,0,.42);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }

    .subtitle{
      font-size:clamp(11px, 1.02vw, 14px);
      line-height:1.18;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }

    .brandQr{
      min-height:70px;
      padding:6px 6px 7px;
      display:grid;
      grid-template-rows:minmax(0, 1fr) auto;
      gap:4px;
      align-items:center;
      justify-items:center;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      position:relative;
      z-index:1;
    }

    .qrBox{
      width:100%;
      height:100%;
      min-height:52px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .qrBox img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#fff;
    }

    .qrFallback{
      color:#101a31;
      font-size:12px;
      line-height:1.15;
      font-weight:900;
      text-align:center;
      letter-spacing:.04em;
    }

    .qrPhone{
      width:100%;
      text-align:center;
      font-size:clamp(8px, .78vw, 10px);
      line-height:1.05;
      font-weight:800;
      color:rgba(255,255,255,.88);
      white-space:normal;
      overflow:visible;
      overflow-wrap:anywhere;
      word-break:break-word;
      letter-spacing:0;
      padding:0 1px;
    }

    .main{
      min-height:0;
      display:grid;
      grid-template-columns:1fr;
      grid-template-rows:minmax(0, 1.1fr) minmax(0, .95fr);
      gap:12px;
    }

    .panel{
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
    }

    .sectionHead{
      position:relative;
      z-index:1;
      padding:13px 16px 11px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02);
    }

    .sectionHead h2{
      margin:0;
      font-size:clamp(20px, 2.1vw, 28px);
      line-height:1.12;
      letter-spacing:.02em;
    }

    .sectionHint{
      font-size:clamp(11px, 1.1vw, 14px);
      line-height:1.2;
      color:var(--muted2);
      text-align:right;
      max-width:42%;
    }

    .ratesWrap{
      position:relative;
      z-index:1;
      min-height:0;
      padding:10px 16px 16px;
      overflow:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    thead th{
      text-align:left;
      padding:12px 12px;
      font-size:clamp(12px, 1.15vw, 15px);
      color:rgba(255,255,255,.82);
      border-bottom:1px solid var(--line);
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    thead th:nth-child(2),
    thead th:nth-child(3){
      text-align:right;
    }

    tbody td{
      padding:13px 12px;
      border-bottom:1px solid var(--line2);
      vertical-align:middle;
      font-size:clamp(21px, 2.2vw, 32px);
    }

    tbody tr:last-child td{
      border-bottom:0;
    }

    td.num{
      text-align:right;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
      font-weight:900;
      white-space:nowrap;
    }

    .ccy{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .badge{
      min-width:62px;
      font-weight:900;
      letter-spacing:.05em;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .unit{
      font-size:.54em;
      color:var(--muted2);
      border:1px solid rgba(255,255,255,.14);
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .placeholderRow{
      opacity:.42;
    }

    .placeholderRow .badge,
    .placeholderRow .num{
      color:rgba(255,255,255,.52);
    }

    .promoWrap{
      position:relative;
      z-index:1;
      min-height:0;
      padding:14px;
      display:flex;
    }

    .adStage{
      min-height:0;
      width:100%;
      position:relative;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .adStage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .adText{
      padding:30px;
      text-align:center;
      font-size:clamp(22px, 2.15vw, 34px);
      line-height:1.18;
      font-weight:900;
      letter-spacing:.02em;
    }

    .adText small{
      display:block;
      margin-top:10px;
      font-size:.52em;
      line-height:1.35;
      color:var(--muted2);
      font-weight:700;
    }

    .footerCard{
      min-height:72px;
      padding:10px 15px;
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto auto;
      gap:16px;
      align-items:center;
    }

    .clockLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:3px;
      position:relative;
      z-index:1;
    }

    .clockLabel{
      font-size:clamp(12px, 1.05vw, 15px);
      color:var(--muted2);
      margin:0;
    }

    .clockDay{
      font-size:clamp(18px, 1.55vw, 22px);
      font-weight:700;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin:0;
    }

    .clockMeta{
      font-size:clamp(11px, 1vw, 14px);
      color:var(--muted3);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin:0;
    }

    .footerStatus{
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:18px;
      position:relative;
      z-index:1;
    }

    .healthMark{
      width:12px;
      height:12px;
      border-radius:50%;
      background:transparent;
      opacity:.9;
      flex:0 0 auto;
      transition:all .25s ease;
    }

    .healthMark.live{
      background:var(--good);
      box-shadow:0 0 0 6px rgba(99,255,144,.12);
    }

    .healthMark.cache{
      background:var(--warn);
      box-shadow:0 0 0 6px rgba(255,207,77,.12);
    }

    .healthMark.offline{
      background:var(--bad);
      box-shadow:0 0 0 6px rgba(255,107,107,.12);
    }

    .clockValue{
      font-size:clamp(30px, 2.5vw, 42px);
      font-weight:900;
      font-variant-numeric:tabular-nums;
      letter-spacing:.03em;
      text-align:right;
      white-space:nowrap;
      position:relative;
      z-index:1;
    }

    @media (max-height: 760px){
      .app{
        gap:10px;
        padding:12px;
      }

      .brandCard{
        min-height:90px;
        padding:11px 14px;
        grid-template-columns:52px minmax(0, 1fr) 102px;
      }

      .logoMark{
        width:52px;
        height:52px;
      }

      .title{
        font-size:clamp(17px, 2.05vw, 24px);
      }

      .subtitle{
        font-size:clamp(10px, .96vw, 12px);
      }

      .brandQr{
        min-height:66px;
        padding:5px 5px 6px;
      }

      .qrBox{
        min-height:48px;
      }

      .qrPhone{
        font-size:clamp(7px, .72vw, 9px);
      }

      .main{
        gap:10px;
      }

      .sectionHead{
        padding:12px 14px 10px;
      }

      .ratesWrap{
        padding:8px 12px 12px;
      }

      tbody td{
        padding:11px 10px;
      }

      .promoWrap{
        padding:10px;
      }

      .adText{
        padding:22px;
      }

      .footerCard{
        min-height:68px;
        padding:10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="rotatedApp">
      <div class="app">
        <div class="card brandCard">
          <div class="logoMark" aria-hidden="true"></div>

          <div class="brandText">
            <div class="title" id="title">TAITONG MONEY CHANGER</div>
            <div class="subtitle" id="subtitle">Exchange Rate • Update otomatis dari Spreadsheet</div>
          </div>

          <div class="brandQr" aria-label="WhatsApp QR">
            <div class="qrBox" id="qrBox">
              <img id="qrImg" alt="WhatsApp QR" />
            </div>
            <div class="qrPhone" id="qrPhone">-</div>
          </div>
        </div>

        <div class="main">
          <section class="card panel" aria-label="Rates">
            <div class="sectionHead">
              <h2>Exchange Rates</h2>
              <div class="sectionHint">*Harga dapat berubah sewaktu-waktu</div>
            </div>

            <div class="ratesWrap">
              <table>
                <thead>
                  <tr>
                    <th>Currency</th>
                    <th>Beli / Buy</th>
                    <th>Jual / Sell</th>
                  </tr>
                </thead>
                <tbody id="ratesBody"></tbody>
              </table>
            </div>
          </section>

          <section class="card panel" aria-label="Promo">
            <div class="sectionHead">
              <h2>Promo &amp; Info</h2>
              <div class="sectionHint">TAITONG</div>
            </div>

            <div class="promoWrap">
              <div class="adStage" id="adStage">
                <div class="adText">
                  INFO
                  <small>Promo & informasi</small>
                </div>
              </div>
            </div>
          </section>
        </div>

        <div class="card footerCard">
          <div class="clockLeft">
            <div class="clockLabel">Waktu Lokal</div>
            <div class="clockDay" id="day">-</div>
            <div class="clockMeta" id="updatedAt">-</div>
          </div>

          <div class="footerStatus">
            <div class="healthMark offline" id="healthMark" aria-hidden="true"></div>
          </div>

          <div class="clockValue" id="clock">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxkuzTHTMtqm26sYesHduzY-YhaE6g8VbhKLBuELHtykLuyP2E15Z1X5gknexortpKR/exec";
    const FALLBACK_LOCAL_JSON = "data-dummy.json";
    const WHATSAPP_QR_URL = "./whatsapp-qr.png";

    const BUILD_VERSION = "tv-20260313-04";
    const DATA_REFRESH_SEC = 180;
    const PAGE_RELOAD_SEC = 300;
    const CACHE_KEY = "taitong-signage-cache-" + BUILD_VERSION;
    const RATES_PAGE_SIZE = 6;
    const RATES_ROTATE_SEC = 8;

    const state = {
      ads: [],
      adIndex: 0,
      adTimer: null,
      dataRefreshHandle: null,
      pageReloadHandle: null,
      hasLiveData: false,
      allRates: [],
      ratesPageIndex: 0,
      ratesPageTimer: null,
      ratesSignature: "",
      adsSignature: ""
    };

    const el = (id) => document.getElementById(id);

    function escapeHtml(str){
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function setVisualMode(mode){
      const health = el("healthMark");
      if (!health) return;

      health.classList.remove("live", "cache", "offline");

      if (mode === "live"){
        health.classList.add("live");
      } else if (mode === "cache"){
        health.classList.add("cache");
      } else {
        health.classList.add("offline");
      }
    }

    function formatID(n){
      if (n === null || n === undefined || n === "") return "—";
      const num = Number(n);
      if (Number.isNaN(num)) return String(n);
      return num.toLocaleString("id-ID", { maximumFractionDigits: 2 });
    }

    function clearOldLocalStorageCaches(){
      try{
        const keysToDelete = [];
        for (let i = 0; i < localStorage.length; i++){
          const key = localStorage.key(i);
          if (key && key.startsWith("taitong-signage-cache-") && key !== CACHE_KEY){
            keysToDelete.push(key);
          }
        }
        keysToDelete.forEach((key) => localStorage.removeItem(key));
      }catch(err){
        console.warn("clearOldLocalStorageCaches failed", err);
      }
    }

    async function clearBrowserCaches(){
      try{
        if ("caches" in window){
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }
      }catch(err){
        console.warn("clearBrowserCaches failed", err);
      }
    }

    async function unregisterServiceWorkers(){
      try{
        if ("serviceWorker" in navigator){
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
      }catch(err){
        console.warn("unregisterServiceWorkers failed", err);
      }
    }

    function initQrImage(){
      const qrBox = el("qrBox");
      const qrImg = el("qrImg");
      const src = WHATSAPP_QR_URL + (WHATSAPP_QR_URL.includes("?") ? "&" : "?") + "v=" + encodeURIComponent(BUILD_VERSION);

      qrImg.onload = () => {};
      qrImg.onerror = () => {
        qrBox.innerHTML = `<div class="qrFallback">WA<br>QR</div>`;
      };
      qrImg.src = src;
    }

    function saveCache(data){
      try{
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          saved_at: Date.now(),
          build_version: BUILD_VERSION,
          data
        }));
      }catch(err){
        console.warn("Cache save failed", err);
      }
    }

    function readCache(){
      try{
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed?.data || null;
      }catch(err){
        console.warn("Cache read failed", err);
        return null;
      }
    }

    function normalizeRates(rates){
      return (rates || []).map(r => ({
        code: String(r.code || r.Currency || r.currency || "").trim(),
        buy: r.buy ?? r.Beli ?? r.beli ?? "",
        sell: r.sell ?? r.Jual ?? r.jual ?? "",
        unit: String(r.unit || r.Unit || r.unit_per || "1"),
        order: Number(r.order || r.Order || 999)
      })).filter(r => r.code);
    }

    function getRatesSignature(rates){
      return JSON.stringify(
        normalizeRates(rates)
          .sort((a,b) => a.order - b.order)
          .map(r => ({
            code: r.code,
            buy: r.buy,
            sell: r.sell,
            unit: r.unit,
            order: r.order
          }))
      );
    }

    function renderPlaceholderRates(){
      const placeholders = [
        { code: "SGD", buy: "—", sell: "—", unit: "1" },
        { code: "EUR", buy: "—", sell: "—", unit: "1" },
        { code: "AUD", buy: "—", sell: "—", unit: "1" },
        { code: "JPY", buy: "—", sell: "—", unit: "100" },
        { code: "CNY", buy: "—", sell: "—", unit: "1" },
        { code: "THB", buy: "—", sell: "—", unit: "1" }
      ];

      el("ratesBody").innerHTML = placeholders.map(r => `
        <tr class="placeholderRow">
          <td>
            <div class="ccy">
              <div class="badge">${escapeHtml(r.code)}</div>
              <div class="unit">/ ${escapeHtml(r.unit)}</div>
            </div>
          </td>
          <td class="num">${r.buy}</td>
          <td class="num">${r.sell}</td>
        </tr>
      `).join("");
    }

    function renderRates(rates){
      const rows = (rates || []).map(r => ({
        code: String(r.code || "").trim(),
        buy: r.buy,
        sell: r.sell,
        unit: String(r.unit || "1"),
        order: Number(r.order || 999)
      }))
      .filter(r => r.code)
      .sort((a,b) => a.order - b.order);

      if (!rows.length){
        renderPlaceholderRates();
        return;
      }

      el("ratesBody").innerHTML = rows.map(r => `
        <tr>
          <td>
            <div class="ccy">
              <div class="badge">${escapeHtml(r.code)}</div>
              <div class="unit">/ ${escapeHtml(r.unit)}</div>
            </div>
          </td>
          <td class="num">${formatID(r.buy)}</td>
          <td class="num">${formatID(r.sell)}</td>
        </tr>
      `).join("");
    }

    function startRatesRotation(rates){
      if (state.ratesPageTimer){
        clearTimeout(state.ratesPageTimer);
        state.ratesPageTimer = null;
      }

      const sortedRates = normalizeRates(rates).sort((a,b) => a.order - b.order);

      state.allRates = sortedRates;
      state.ratesPageIndex = 0;

      if (!sortedRates.length){
        renderPlaceholderRates();
        return;
      }

      const totalPages = Math.ceil(sortedRates.length / RATES_PAGE_SIZE);

      const showPage = () => {
        const start = state.ratesPageIndex * RATES_PAGE_SIZE;
        const end = start + RATES_PAGE_SIZE;
        const pageRows = sortedRates.slice(start, end);

        renderRates(pageRows);

        state.ratesPageIndex = (state.ratesPageIndex + 1) % totalPages;
        state.ratesPageTimer = setTimeout(showPage, RATES_ROTATE_SEC * 1000);
      };

      showPage();
    }

    function setHeader(data){
      const settings = data?.settings || {};
      const title = settings.title || "TAITONG MONEY CHANGER";
      const branch = settings.branch ? String(settings.branch) : "TAITONG";
      const address = settings.address ? ` • ${String(settings.address)}` : "";
      const phoneRaw = settings.phone ? String(settings.phone).trim() : "";

      el("title").textContent = title;
      el("subtitle").textContent = `Exchange Rate • ${branch}${address}`;
      el("qrPhone").textContent = phoneRaw || "WhatsApp";

      const when = data?.generated_at ? new Date(data.generated_at) : new Date();
      el("updatedAt").textContent = `Update: ${when.toLocaleString("id-ID", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      })}`;
    }

    function normalizeAds(ads){
      return (ads || []).map(a => ({
        type: String(a.type || "text").toLowerCase(),
        content: a.content || a.url || a.text || "",
        duration_sec: Math.max(3, Number(a.duration_sec || a.duration || 8)),
        order: Number(a.order || 999)
      })).filter(a => a.content);
    }

    function getAdsSignature(ads){
      return JSON.stringify(
        normalizeAds(ads)
          .sort((a,b) => a.order - b.order)
          .map(a => ({
            type: a.type,
            content: a.content,
            duration_sec: a.duration_sec,
            order: a.order
          }))
      );
    }

    function renderAdFallback(){
      el("adStage").innerHTML = `
        <div class="adText">
          INFO
          <small>Promo & informasi</small>
        </div>
      `;
    }

    function renderAd(item){
      const stage = el("adStage");

      if (!item){
        renderAdFallback();
        return;
      }

      if (item.type === "image"){
        stage.innerHTML = "";
        const img = document.createElement("img");
        img.src = item.content + (item.content.includes("?") ? "&" : "?") + "t=" + Date.now() + "&v=" + encodeURIComponent(BUILD_VERSION);
        img.alt = "Promo";
        img.referrerPolicy = "no-referrer";
        img.onerror = () => {
          renderAdFallback();
        };
        stage.appendChild(img);
      } else {
        stage.innerHTML = `
          <div class="adText">
            ${escapeHtml(item.content)}
            <small>Promo TAITONG • Hubungi staff untuk info lebih lanjut</small>
          </div>
        `;
      }
    }

    function startAdsRotation(){
      if (state.adTimer) clearTimeout(state.adTimer);

      if (!state.ads.length){
        renderAdFallback();
        return;
      }

      const showNext = () => {
        const item = state.ads[state.adIndex % state.ads.length];
        state.adIndex++;
        renderAd(item);
        state.adTimer = setTimeout(showNext, item.duration_sec * 1000);
      };

      showNext();
    }

    function parsePossiblyWrappedJSON(text){
      const trimmed = String(text || "").trim();

      if (!trimmed) throw new Error("Empty response");

      try{
        return JSON.parse(trimmed);
      }catch(e){}

      const jsonpMatch = trimmed.match(/^[^(]+\(([\s\S]*)\)\s*;?\s*$/);
      if (jsonpMatch && jsonpMatch[1]){
        return JSON.parse(jsonpMatch[1]);
      }

      throw new Error("Response is not valid JSON/JSONP");
    }

    function fetchJSONP(url){
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 8000);

        function cleanup(){
          clearTimeout(timeout);
          try { delete window[cb]; } catch(e) {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP load failed"));
        };

        const sep = url.includes("?") ? "&" : "?";
        script.src = url + sep + "callback=" + cb + "&t=" + Date.now() + "&v=" + encodeURIComponent(BUILD_VERSION);
        document.body.appendChild(script);
      });
    }

    async function fetchDirectJSON(url){
      const sep = url.includes("?") ? "&" : "?";
      const res = await fetch(url + sep + "t=" + Date.now() + "&v=" + encodeURIComponent(BUILD_VERSION), {
        method: "GET",
        cache: "no-store",
        redirect: "follow"
      });
      if (!res.ok) throw new Error("Direct fetch failed");
      const text = await res.text();
      return parsePossiblyWrappedJSON(text);
    }

    async function fetchLocalJSON(url){
      const res = await fetch(
        url + "?t=" + Date.now() + "&v=" + encodeURIComponent(BUILD_VERSION),
        { cache: "no-store" }
      );
      if (!res.ok) throw new Error("Local JSON fetch failed");
      return await res.json();
    }

    async function fetchData(){
      if (API_URL && API_URL.trim()){
        try{
          return await fetchJSONP(API_URL.trim());
        }catch(errJsonp){
          return await fetchDirectJSON(API_URL.trim());
        }
      }
      return await fetchLocalJSON(FALLBACK_LOCAL_JSON);
    }

    function applyData(data, source = "live"){
      if (!data || typeof data !== "object") return;

      setHeader(data);

      const newRatesSignature = getRatesSignature(data.rates || []);
      if (newRatesSignature !== state.ratesSignature){
        state.ratesSignature = newRatesSignature;
        startRatesRotation(data.rates || []);
      }

      const normalizedAds = normalizeAds(data.ads || []).sort((a,b) => a.order - b.order);
      const newAdsSignature = getAdsSignature(normalizedAds);

      if (newAdsSignature !== state.adsSignature){
        state.adsSignature = newAdsSignature;
        state.ads = normalizedAds;
        state.adIndex = 0;
        startAdsRotation();
      }

      if (source === "live"){
        state.hasLiveData = true;
        saveCache(data);
        setVisualMode("live");
      } else {
        setVisualMode("cache");
      }
    }

    function applyQuietFallback(){
      renderPlaceholderRates();
      renderAdFallback();
      setVisualMode("offline");

      if (!el("updatedAt").textContent || el("updatedAt").textContent === "-"){
        el("updatedAt").textContent = "Update: —";
      }

      if (!el("qrPhone").textContent || el("qrPhone").textContent === "-"){
        el("qrPhone").textContent = "WhatsApp";
      }
    }

    function scheduleDataRefresh(sec){
      if (state.dataRefreshHandle) clearTimeout(state.dataRefreshHandle);
      state.dataRefreshHandle = setTimeout(() => {
        loadData().catch(console.error);
      }, Math.max(5, sec) * 1000);
    }

    function schedulePageReload(sec){
      if (state.pageReloadHandle) clearTimeout(state.pageReloadHandle);
      state.pageReloadHandle = setTimeout(() => {
        hardReloadPage();
      }, Math.max(15, sec) * 1000);
    }

    function hardReloadPage(){
      try{
        localStorage.setItem("taitong-last-reload", String(Date.now()));
      }catch(e){}

      const url = new URL(window.location.href);
      url.searchParams.set("_page", Date.now().toString());
      url.searchParams.set("_v", BUILD_VERSION);
      url.searchParams.set("_r", Math.random().toString(36).slice(2));
      window.location.replace(url.toString());
    }

    async function loadData(){
      try{
        const data = await fetchData();
        applyData(data, "live");

        const refreshFromSheet = Number(data?.settings?.refresh_sec || DATA_REFRESH_SEC);
        scheduleDataRefresh(refreshFromSheet);
      }catch(err){
        console.error("Live load failed:", err);

        const cached = readCache();
        if (cached){
          applyData(cached, "cache");
        }else{
          applyQuietFallback();
        }

        scheduleDataRefresh(DATA_REFRESH_SEC);
      }
    }

    function tickClock(){
      const d = new Date();
      el("day").textContent = d.toLocaleDateString("id-ID", {
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
      });
      el("clock").textContent = d.toLocaleTimeString("id-ID", {
        hour12:false
      });
    }

    async function init(){
      tickClock();
      setInterval(tickClock, 1000);

      clearOldLocalStorageCaches();
      await unregisterServiceWorkers();
      await clearBrowserCaches();
      initQrImage();

      const cached = readCache();
      if (cached){
        applyData(cached, "cache");
      }else{
        applyQuietFallback();
      }

      await loadData();
      schedulePageReload(PAGE_RELOAD_SEC);

      window.addEventListener("pageshow", () => {
        setTimeout(() => loadData().catch(console.error), 300);
      });

      window.addEventListener("focus", () => {
        setTimeout(() => loadData().catch(console.error), 300);
      });
    }

    init();
  </script>
</body>
</html>
